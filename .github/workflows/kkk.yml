name: Cleanup Old Workflows

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: 清理历史流程
        run: |
          # 明确指定仓库名，避免 git repository 报错
          repo="${{ github.repository }}"
          
          echo "🔍 正在获取仓库 $repo 的历史记录..."
          
          # 获取非运行中的前 100 条记录 ID
          runs=$(gh run list -R "$repo" --limit 100 --json databaseId,status -q '.[] | select(.status != "in_progress") | .databaseId')
          
          if [ -z "$runs" ]; then
            echo "✅ 没有发现可清理的历史记录。"
            exit 0
          fi

          for run_id in $runs; do
            echo "🗑️ 正在删除 ID: $run_id"
            gh run delete -R "$repo" "$run_id"
          done
          
          echo "✨ 清理完成！"
        env:
          GH_TOKEN: ${{ github.token }}