name: Cleanup Old Workflows

on:
  workflow_dispatch: # 手动触发
  schedule:
    - cron: '0 0 * * *' # 每天凌晨运行

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete workflow runs
        run: |
          # 获取当前仓库的所有工作流运行记录 ID
          # 排除掉当前正在运行的这个记录 (status != in_progress)
          runs=$(gh run list --limit 100 --json databaseId,status -q '.[] | select(.status != "in_progress") | .databaseId')
          
          if [ -z "$runs" ]; then
            echo "没有发现可清理的历史记录。"
            exit 0
          fi

          for run_id in $runs; do
            echo "正在删除运行记录 ID: $run_id"
            gh run delete "$run_id"
          done
        env:
          GH_TOKEN: ${{ github.token }}