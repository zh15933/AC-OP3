name: 'My Composite Action'
description: 'Combines multiple steps'
runs:
  using: "composite"
  steps:
    - name: 整理上传固件的名称
      shell: bash
      run: |
        cd $HOME_PATH
        if [[ -n "${{ env.TARGET_PROFILE_IMG }}" ]]; then
           echo "SHANGCHUAN_MINGCHEN=${{ env.SOURCE }}-${{ env.LUCI_EDITION }}-${{ env.TARGET_PROFILE_IMG }}" >> ${GITHUB_ENV}
           echo "RR_RELEASE=b" >> ${GITHUB_ENV}
        else
           echo "SHANGCHUAN_MINGCHEN=${{ env.SOURCE }}-${{ env.LUCI_EDITION }}-${{ env.TARGET_PROFILE }}" >> ${GITHUB_ENV}
           echo "RR_RELEASE=a" >> ${GITHUB_ENV}
        fi
        [[ -z "${DATE}" ]] && echo "DATE=$(date "+%Y%m%d%H%M%S")" >> ${GITHUB_ENV}
        [[ -z "${TONGZHI_DATE}" ]] && echo "TONGZHI_DATE=$(date +%Y年%m月%d日)" >> ${GITHUB_ENV}
        [[ -z "${FIRMWARE_DATE}" ]] && echo "FIRMWARE_DATE=$(date +%Y-%m%d-%H%M)" >> ${GITHUB_ENV}
        echo "TZ_Message=$(date +%Y年%m月%d号%H时%M分)" >> ${GITHUB_ENV}
  
    - name: 上传固件在 github Artifacts
      id: shang
      if: env.UPLOAD_FIRMWARE == 'true'
      uses: actions/upload-artifact@main
      with:
        name: ${{ env.SHANGCHUAN_MINGCHEN }}-firmware-${{ env.FIRMWARE_DATE }}
        path: ${{ env.FIRMWARE_PATH }}

    - name: 上传信息
      if: steps.shang.outcome == 'success' && env.UPLOAD_FIRMWARE == 'true'
      shell: bash
      run: |
        cd $HOME_PATH
        echo "SHANG_MESSAGE=、上传Artifacts" >> ${GITHUB_ENV}

    - name: 生成 Release 说明（含插件列表）
      if: env.UPLOAD_RELEASE == 'true'
      shell: bash
      run: |
        set -e
        NOTES="${GITHUB_WORKSPACE}/release.md"
        CFG="${HOME_PATH}/.config"

        KERNEL_VER=""
        if [[ -f "${CFG}" ]]; then
          KERNEL_VER="$(grep -E '^CONFIG_KERNEL_PATCHVER=' "${CFG}" | head -n1 | cut -d= -f2 | tr -d '"' || true)"
          if [[ -z "${KERNEL_VER}" ]]; then
            KERNEL_VER="$(grep -E '^CONFIG_LINUX_[0-9]+_[0-9]+=y$' "${CFG}" | head -n1 | sed -E 's/^CONFIG_LINUX_([0-9]+)_([0-9]+)=y$/\1.\2/' || true)"
          fi
        fi

        RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/a${DATE}"

        {
          echo "★ 源码：${REPO_URL}"
          echo "★ 分支：${REPO_BRANCH}"
          [[ -n "${KERNEL_VER}" ]] && echo "🖥 内核版本：${KERNEL_VER}"
          [[ -n "${kernel_usage:-}" ]] && echo "🔧 内核仓库：${kernel_usage}"
          echo "📌 编译时间：${TZ_Message}"
          echo
          echo "📦 包含插件列表："
        } > "${NOTES}"

        if [[ -f "${CFG}" ]]; then
          mapfile -t PKGS < <(
            grep -E '^CONFIG_PACKAGE_luci-(app|theme)-[a-z0-9][a-z0-9+.-]*=y$' "${CFG}" \
              | sed -E 's/^CONFIG_PACKAGE_([^=]+)=y$/\1/' \
              | sort -u
          )
          if [[ ${#PKGS[@]} -gt 0 ]]; then
            i=1
            for p in "${PKGS[@]}"; do
              echo "${i}、${p}" >> "${NOTES}"
              i=$((i+1))
            done
          else
            echo "（未检测到 luci-app/luci-theme）" >> "${NOTES}"
          fi
        else
          echo "（未找到 .config，无法提取插件列表）" >> "${NOTES}"
        fi

        {
          echo
          echo "🎉 [${SHANGCHUAN_MINGCHEN}]固件下载"
          echo "${RELEASE_URL}"
        } >> "${NOTES}"

        if [[ "${RR_RELEASE}" == "b" ]]; then
          {
            echo
            echo "---"
            echo "写入EMMC：Login to OpenWrt → System → Amlogic Service → Install OpenWrt"
          } >> "${NOTES}"
        fi

        {
          echo "RELEASE_BODY<<EOF"
          cat "${NOTES}"
          echo "EOF"
        } >> ${GITHUB_ENV}

    - name: 发布固件
      id: fabu
      if: env.UPLOAD_RELEASE == 'true' && env.RR_RELEASE == 'a'
      uses: ncipollo/release-action@v1
      with:
        name: ${{ env.SHANGCHUAN_MINGCHEN }}
        tag: a${{ env.DATE }}
        token: ${{ env.REPO_TOKEN }}
        allowUpdates: true
        body: ${{ env.RELEASE_BODY }}
        artifacts: "${{ env.FIRMWARE_PATH }}/*"

    - name: 发布固件到 Github Releases
      id: nfabu
      if: env.UPLOAD_RELEASE == 'true' && env.RR_RELEASE == 'b'
      uses: ncipollo/release-action@v1
      with:
        name: ${{ env.amlogic_model }}
        tag: a${{ env.DATE }}
        token: ${{ env.REPO_TOKEN }}
        allowUpdates: true
        artifacts: "${{ env.FIRMWARE_PATH }}/*"
        body: ${{ env.RELEASE_BODY }}

    - name: 发布信息
      if: steps.fabu.outcome == 'success' && env.UPLOAD_RELEASE == 'true' || steps.nfabu.outcome == 'success' && env.UPLOAD_RELEASE == 'true'
      shell: bash
      run: |
        cd $HOME_PATH
        echo "FABU_MESSAGE=、发布" >> ${GITHUB_ENV}
        
    - name: Telegram或pushplus信息通知
      if: env.PUSH_PLUS_TOKEN && env.INFORMATION_NOTICE == 'PUSH' || env.TELEGRAM_BOT_TOKEN && env.INFORMATION_NOTICE == 'TG'
      shell: bash
      run: |
        cd ${GITHUB_WORKSPACE}
        if [[ "${{ env.INFORMATION_NOTICE }}" == "TG" ]]; then
           curl -s -X POST -H "Content-Type: application/json" -d '{"chat_id":"${{env.TELEGRAM_CHAT_ID}}", "text":"${{env.SOURCE}}-${{env.LUCI_EDITION}}，${{env.TARGET_PROFILE}}固件，编译${{env.DABAO_MESSAGE}}${{env.SHANG_MESSAGE}}${{env.FABU_MESSAGE}}${{env.YUNDUAN_MESSAGE}}成功，✌️💐(${{env.WAREHOUSE_MAN}}-#${{env.RUN_NUMBER}})，${{env.TZ_Message}}💯"}' https://api.telegram.org/bot${{env.TELEGRAM_BOT_TOKEN}}/sendMessage
        fi
        if [[ "${{ env.INFORMATION_NOTICE }}" == "PUSH" ]]; then
           curl -s -X POST -H "Content-Type: application/json" -d '{"token":"${{env.PUSH_PLUS_TOKEN}}","title":"${{env.SOURCE}}-${{env.LUCI_EDITION}}","content":"${{env.TARGET_PROFILE}}固件，编译${{env.DABAO_MESSAGE}}${{env.SHANG_MESSAGE}}${{env.FABU_MESSAGE}}${{env.YUNDUAN_MESSAGE}}成功，✌️💐(${{env.WAREHOUSE_MAN}}-#${{env.RUN_NUMBER}})，${{env.TZ_Message}}💯"}' https://www.pushplus.plus/send
        fi
branding:
  icon: "terminal"
  color: "gray-dark"
